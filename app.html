  <!-- ===== Supabase cloud sync (mirrors the app's local data to your account) =====
       Uses plain REST + the login token already in localStorage. Resilient to the
       free tier's intermittent 503s: retries writes, flushes on page exit, and never
       lets the cloud overwrite local edits that haven't synced yet (a "dirty" guard). -->
  <script>
  (function(){
    const REST  = "https://yaohjueiififikjypvuv.supabase.co/rest/v1";
    const ANON  = "sb_publishable_uHmKxUaOvi-2CfVUhxtphA_IcXLDP_l";
    const KEY   = "hybrid_tracker_v1";
    const DIRTY = "hybrid_tracker_dirty";   // "1" => local has edits not yet confirmed saved
    const TABLE = "tracker_state";

    // Read the current login token the parent (login page) stored in localStorage.
    function readSession(){
      try {
        let raw = null;
        for (let i = 0; i < localStorage.length; i++){
          const k = localStorage.key(i);
          if (/^sb-.*-auth-token$/.test(k)){ raw = localStorage.getItem(k); break; }
        }
        if (!raw) return {};
        let s = JSON.parse(raw); s = s.currentSession || s;
        return { token: s.access_token, userId: s.user && s.user.id };
      } catch (e){ return {}; }
    }
    function headers(token, extra){
      return Object.assign({ apikey: ANON, Authorization: "Bearer " + token, "Content-Type": "application/json" }, extra || {});
    }
    function sleep(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }

    // POST with retries to ride out transient 5xx / 429 from the free tier.
    async function upsert(token, userId, data, opts){
      opts = opts || {};
      const body = JSON.stringify({ user_id: userId, data: data, updated_at: new Date().toISOString() });
      const tries = opts.keepalive ? 1 : 4;
      for (let i = 0; i < tries; i++){
        try {
          const r = await fetch(REST + "/" + TABLE + "?on_conflict=user_id", {
            method: "POST", keepalive: !!opts.keepalive,
            headers: headers(token, { Prefer: "resolution=merge-duplicates" }),
            body: body
          });
          if (r.ok) return true;
          if (r.status < 500 && r.status !== 429) return false;   // 4xx won't fix on retry
        } catch (e){ /* network blip -> retry */ }
        if (i < tries - 1) await sleep(600 * (i + 1));            // backoff
      }
      return false;
    }

    const origSet = localStorage.setItem.bind(localStorage);
    let ready = false, timer = null, syncing = false;

    // Mark every app write dirty and schedule a debounced save.
    localStorage.setItem = function(k, v){
      origSet(k, v);
      if (k === KEY){ origSet(DIRTY, "1"); schedule(); }
    };
    function schedule(){ clearTimeout(timer); timer = setTimeout(flush, 500); }
    async function flush(){
      if (!ready || syncing){ schedule(); return; }
      const { token, userId } = readSession();
      if (!token || !userId) return;                         // not signed in -> local-only
      const snapshot = localStorage.getItem(KEY);
      syncing = true;
      let ok = false;
      try { ok = await upsert(token, userId, JSON.parse(snapshot)); } catch (e){}
      syncing = false;
      if (ok){ if (localStorage.getItem(KEY) === snapshot) origSet(DIRTY, ""); }   // clear only if unchanged since
      else { schedule(); }                                    // failed -> keep dirty, try again
    }

    // Best-effort flush when the page is hidden/closing (covers check-then-refresh).
    function flushNow(){
      if (localStorage.getItem(DIRTY) !== "1") return;
      const { token, userId } = readSession();
      if (!token || !userId) return;
      const cur = localStorage.getItem(KEY);
      if (cur) { try { upsert(token, userId, JSON.parse(cur), { keepalive: true }); } catch (e){} }
    }
    window.addEventListener("pagehide", flushNow);
    document.addEventListener("visibilitychange", function(){ if (document.visibilityState === "hidden") flushNow(); });

    // Before the app reads localStorage: reconcile with the cloud.
    window.__cloudInit = (async function(){
      try {
        const { token, userId } = readSession();
        if (!token || !userId) return;                       // not signed in -> local-only
        if (localStorage.getItem(DIRTY) === "1"){
          // Local has unsynced edits -> push them up; do NOT overwrite with the cloud.
          const local = localStorage.getItem(KEY);
          if (local){ const ok = await upsert(token, userId, JSON.parse(local)); if (ok) origSet(DIRTY, ""); }
          return;
        }
        const ctrl = new AbortController();
        const to = setTimeout(function(){ ctrl.abort(); }, 4000);
        const r = await fetch(REST + "/" + TABLE + "?select=data&user_id=eq." + userId, { headers: headers(token), signal: ctrl.signal });
        clearTimeout(to);
        if (r.ok){
          const arr = await r.json();
          if (arr[0] && arr[0].data){ origSet(KEY, JSON.stringify(arr[0].data)); }   // seed local from cloud
          else { const local = localStorage.getItem(KEY); if (local) await upsert(token, userId, JSON.parse(local)); }
        }
        // If the read failed, leave local untouched (never clobber).
      } catch (e){ /* fall back to local-only */ }
      finally { ready = true; }
    })();
  })();
  </script>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    if (window.__cloudInit) {   // seed localStorage from cloud first, but never block the render for long
      try { await Promise.race([window.__cloudInit, new Promise(function(r){ setTimeout(r, 4500); })]); } catch (e) {}
    }
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ry {\n      const raw = localStorage.getItem('hybrid_tracker_v1');\n      if (raw) { const p = JSON.parse(raw); return { medium: p.medium||{}, plan: p.plan||{}, meas: p.meas||{}, _seeded: p._seeded }; }\n    } catch (e) {}\n    return { medium:{}, plan:{}, meas:{} };\n  }\n  persist() { try { localStorage.setItem(this.KEY, JSON.stringify(this.data)); } catch (e) {} }\n\n  componentDidMount() {\n    const t = (this.props && this.props.theme) || 'daylight';\n    if (t !== this.state.theme) this.setState({ theme: t });\n    if (this.root) this.root.className = 'tracker theme-' + t;\n  }\n  componentDidUpdate(prev) {\n    const t = (this.props && this.props.theme);\n    if (t && prev.props && prev.props.theme !== t && t !== this.state.theme) this.setTheme(t);\n  }\n\n  rootRef = (el) => { if (el) { this.root = el; el.className = 'tracker theme-' + this.state.theme; } };\n  setTheme(id) { this.setState({ theme: id }); if (this.root) this.root.className = 'tracker theme-' + id; }\n\n  startOfDay(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }\n  parseDate(s) { const p = (s||'').split('-'); return new Date(+p[0], (+p[1])-1, +p[2]); }\n  addDays(d, n) { const x = new Date(d); x.setDate(x.getDate()+n); return x; }\n  fmt(d) { return this.WD[d.getDay()] + ', ' + this.MO[d.getMonth()] + ' ' + d.getDate(); }\n  fmtShort(d) { return this.MO[d.getMonth()] + ' ' + d.getDate(); }\n\n  isComplete(day) { const d = this.data.medium[day]; if (!d) return false; return this.TASK_KEYS.every(k => d[k]); }\n  partialCount(day) { const d = this.data.medium[day]; if (!d) return 0; return this.TASK_KEYS.filter(k => d[k]).length; }\n\n  toggleMedium(day, key) {\n    const m = this.data.medium; const o = m[day] || (m[day] = {});\n    o[key] = !o[key]; this.persist(); this.forceUpdate();\n  }\n  selectDay(day) { this.setState({ focusDay: day }); }\n  togglePlan(n, ci) {\n    const p = this.data.plan; const o = p[n] || (p[n] = {});\n    o[ci] = !o[ci]; this.persist(); this.forceUpdate();\n  }\n  togglePic(w) {\n    const m = this.data.meas; const o = m['w'+w] || (m['w'+w] = {});\n    o.pic = !o.pic; this.persist(); this.forceUpdate();\n  }\n  setMeas(w, key, val) {\n    const m = this.data.meas; const o = m['w'+w] || (m['w'+w] = {});\n    o[key] = val; this.persist();\n  }\n\n  boxStyle(done) {\n    return 'width:22px;height:22px;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;'\n      + 'border:2px solid ' + (done ? 'var(--accent)' : 'var(--line)') + ';'\n      + 'background:' + (done ? 'var(--accent)' : 'transparent') + ';'\n      + 'color:' + (done ? 'var(--accent-ink)' : 'transparent') + ';'\n      + (done ? 'animation:pop .25s ease;' : '');\n  }\n  labelStyle(done) {\n    return 'font-weight:600;font-size:14.5px;' + (done ? 'color:var(--muted);text-decoration:line-through;text-decoration-color:var(--muted)' : 'color:var(--ink)');\n  }\n\n  gridStyle(day, di, focusDay) {\n    const done = this.isComplete(day);\n    const isToday = day === di;\n    const isFocus = day === focusDay;\n    const isPast = day < di;\n    const part = this.partialCount(day);\n    let bg = 'transparent', col = 'var(--muted)', bd = '1px solid var(--line)';\n    if (done) { bg = 'var(--done)'; col = '#06251a'; bd = '1px solid var(--done)'; }\n    else if (isToday) { bg = 'var(--panel2)'; col = 'var(--ink)'; bd = '2px solid var(--accent)'; }\n    else if (isPast) { bg = 'var(--panel2)'; col = part > 0 ? 'var(--ink)' : 'var(--muted)'; bd = part > 0 ? '1px solid var(--accent)' : '1px solid var(--line)'; }\n    const ring = isFocus ? 'box-shadow:0 0 0 3px var(--accent);' : '';\n    return 'aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:9px;'\n      + \"font-family:'Spline Sans Mono',monospace;font-size:13px;font-weight:600;cursor:pointer;\"\n      + 'background:' + bg + ';color:' + col + ';border:' + bd + ';' + ring;\n  }\n\n  planCellStyle(done, isRace, isToday, big) {\n    let bg = 'var(--panel2)', bd = '1px solid var(--line)';\n    if (isRace) bd = '1px solid var(--race)';\n    if (done) { bg = 'color-mix(in srgb, var(--accent) 16%, var(--panel2))'; bd = '1px solid var(--accent)'; }\n    const ring = isToday ? 'box-shadow:inset 0 0 0 2px var(--accent);' : '';\n    const pad = big ? '14px 15px' : '11px 12px';\n    const mh = big ? '106px' : '80px';\n    return 'padding:' + pad + ';border-radius:12px;cursor:pointer;display:flex;flex-direction:column;gap:8px;min-height:' + mh + ';'\n      + 'background:' + bg + ';border:' + bd + ';' + ring;\n  }\n  planTextStyle(done, isRace, big) {\n    let s = 'font-size:' + (big ? '15px' : '12.5px') + ';font-weight:600;line-height:1.25;';\n    if (isRace) s += 'color:var(--race);font-weight:800;text-transform:uppercase;letter-spacing:0.02em;';\n    else if (done) s += 'color:var(--muted);text-decoration:line-through;';\n    else s += 'color:var(--ink);';\n    return s;\n  }\n  markStyle(done) {\n    return 'width:17px;height:17px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;'\n      + (done ? 'background:var(--accent);color:var(--accent-ink);' : 'border:1px solid var(--line);color:transparent;');\n  }\n\n  renderVals() {\n    const di_raw = (() => {\n      const start = this.parseDate((this.props && this.props.mediumStartDate) || '2026-06-22');\n      const now = this.startOfDay(new Date());\n      return Math.floor((now - this.startOfDay(start)) / 86400000) + 1;\n    })();\n    const start = this.parseDate((this.props && this.props.mediumStartDate) || '2026-06-22');\n    const di = Math.min(Math.max(di_raw, 1), 75);\n    const focusDay = this.state.focusDay || di;\n    const theme = this.state.theme;\n    const tab = this.state.tab;\n\n    // theme switcher\n    const themeBtn = (active) => 'padding:6px 13px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:12px;'\n      + (active ? 'background:var(--accent);color:var(--accent-ink);' : 'background:transparent;color:var(--muted);');\n    const themes = [\n      { id:'forge', name:'Forge' }, { id:'daylight', name:'Daylight' }, { id:'console', name:'Console' }\n    ].map(t => ({ name: t.name, style: themeBtn(theme === t.id), onClick: () => this.setTheme(t.id) }));\n\n    // tabs\n    const tabBtn = (active) => 'padding:9px 16px;border-radius:11px;cursor:pointer;font-family:inherit;font-weight:700;font-size:12.5px;text-transform:uppercase;letter-spacing:0.03em;'\n      + 'border:1px solid ' + (active ? 'var(--accent)' : 'var(--line)') + ';'\n      + (active ? 'background:var(--accent);color:var(--accent-ink);' : 'background:transparent;color:var(--ink);');\n    const tabs = [\n      { id:'medium', label:'75 Medium' }, { id:'plan', label:'Training Plan' },\n      { id:'meas', label:'Measurements' }, { id:'ref', label:'Reference' }\n    ].map(t => ({ label: t.label, style: tabBtn(tab === t.id), onClick: () => this.setState({ tab: t.id }) }));\n\n    // 75 medium hero\n    let completeCount = 0;\n    for (let d = 1; d <= 75; d++) if (this.isComplete(d)) completeCount++;\n    const pct = Math.round(completeCount / 75 * 100);\n    let sd = di; if (!this.isComplete(sd)) sd--; let streak = 0;\n    for (let d = sd; d >= 1; d--) { if (this.isComplete(d)) streak++; else break; }\n\n    // week chips\n    const cw = Math.min(Math.ceil(di / 7), 11);\n    const wkStart = (cw - 1) * 7 + 1;\n    const wkEnd = Math.min(cw * 7, 75);\n    const weekChips = [];\n    for (let day = wkStart; day <= wkEnd; day++) {\n      const done = this.isComplete(day); const isToday = day === di; const isFocus = day === focusDay;\n      let bg = 'var(--panel)', bd = '1px solid var(--line)', col = 'var(--ink)';\n      if (done) { bg = 'color-mix(in srgb, var(--done) 18%, var(--panel))'; bd = '1px solid var(--done)'; }\n      if (isToday) bd = '2px solid var(--accent)';\n      if (isFocus) bd = '2px solid var(--accent)';\n      const ring = isFocus ? 'box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 35%, transparent);' : '';\n      const dt = this.addDays(start, day - 1);\n      weekChips.push({\n        day, weekday: this.WD[dt.getDay()], frac: this.partialCount(day) + '/7',\n        style: 'display:flex;flex-direction:column;align-items:center;gap:3px;padding:13px 8px;border-radius:14px;cursor:pointer;background:' + bg + ';border:' + bd + ';color:' + col + ';' + ring,\n        onClick: () => this.selectDay(day)\n      });\n    }\n    const wsd = this.addDays(start, wkStart - 1), wed = this.addDays(start, wkEnd - 1);\n    const weekTitle = 'Days ' + wkStart + '–' + wkEnd + ' · ' + this.fmtShort(wsd) + ' – ' + this.fmtShort(wed);\n\n    // focus card\n    const fdt = this.addDays(start, focusDay - 1);\n    const fComplete = this.isComplete(focusDay);\n    const fDone = this.partialCount(focusDay);\n    const plannedWorkout = (() => {\n      const date = this.startOfDay(this.addDays(start, focusDay - 1));\n      const ps = this.startOfDay(this.parseDate((this.props && this.props.planStartDate) || '2026-06-29'));\n      const diff = Math.floor((date - ps) / 86400000);\n      if (diff < 0) return null;\n      const wk = Math.floor(diff / 7), col = diff % 7;\n      if (wk < 0 || wk >= this.PLAN.length) return null;\n      return this.PLAN[wk][3][col];\n    })();\n    const mkTask = (t) => {\n      const done = !!(this.data.medium[focusDay] && this.data.medium[focusDay][t.key]);\n      let label = t.label, sub = '';\n      if (t.key === 'workout') {\n        if (plannedWorkout) { label = plannedWorkout; sub = '45-min workout'; }\n        else { label = '45-min workout'; sub = 'Plan starts Jun 29'; }\n      }\n      return { label, sub, mark: done ? '✓' : '', boxStyle: this.boxStyle(done), labelStyle: this.labelStyle(done), subStyle: 'font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px;' + (sub ? '' : 'display:none'), onToggle: () => this.toggleMedium(focusDay, t.key) };\n    };\n\n    // 75 grid\n    const grid = [];\n    for (let day = 1; day <= 75; day++) grid.push({ day, style: this.gridStyle(day, di, focusDay), onClick: () => this.selectDay(day) });\n\n    // plan\n    const planStart = this.parseDate((this.props && this.props.planStartDate) || '2026-06-29');\n    const now = this.startOfDay(new Date());\n    const diffW = Math.floor((now - this.startOfDay(planStart)) / (7 * 86400000));\n    const curPlanWeek = diffW + 1;\n    const highlightWeek = Math.min(Math.max(curPlanWeek, 1), 24);\n    const todayCol = (now.getDay() + 6) % 7;\n    const phaseStyle = (c) => 'background:color-mix(in srgb,' + c + ' 16%, transparent);color:' + c + ';padding:3px 9px;border-radius:6px;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:0.04em';\n    const weeks = this.PLAN.map(row => {\n      const n = row[0], dates = row[1], phase = row[2], days = row[3];\n      const c = this.PHASE_COLORS[phase];\n      const isCurrent = n === highlightWeek;\n      const cells = days.map((text, ci) => {\n        const done = !!(this.data.plan[n] && this.data.plan[n][ci]);\n        const isRace = this.RACE_RE.test(text);\n        const isToday = (n === curPlanWeek) && (ci === todayCol);\n        return { weekday: this.WDS[ci], text, mark: done ? '✓' : '', style: this.planCellStyle(done, isRace, isToday), bigStyle: this.planCellStyle(done, isRace, isToday, true), textStyle: this.planTextStyle(done, isRace), bigTextStyle: this.planTextStyle(done, isRace, true), markStyle: this.markStyle(done), onToggle: () => this.togglePlan(n, ci) };\n      });\n      return { n, dates, phase, phaseStyle: phaseStyle(c), isCurrent, cardStyle: 'background:var(--panel);border:1px solid ' + (isCurrent ? 'var(--accent)' : 'var(--line)') + ';border-radius:16px;padding:16px 16px 18px', cells };\n    });\n    const phaseLegend = Object.keys(this.PHASE_COLORS).map(name => {\n      const c = this.PHASE_COLORS[name];\n      return { name, style: 'display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--muted);' };\n    }).map((p, i) => ({ name: p.name, style: 'display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:4px 10px 4px 8px;border-radius:999px;background:color-mix(in srgb,' + Object.values(this.PHASE_COLORS)[i] + ' 14%, transparent);color:' + Object.values(this.PHASE_COLORS)[i] }));\n\n    // measurements\n    const measRows = [];\n    for (let w = 1; w <= 11; w++) {\n      const s = this.addDays(start, (w - 1) * 7), e = this.addDays(start, Math.min(w * 7 - 1, 74));\n      const rec = this.data.meas['w' + w] || {};\n      const picDone = !!rec.pic;\n      measRows.push({\n        week: w, dates: this.fmtShort(s) + ' – ' + this.fmtShort(e),\n        rowStyle: 'display:grid;grid-template-columns:140px 64px repeat(8,1fr);border-bottom:1px solid var(--line);background:' + (w % 2 ? 'transparent' : 'color-mix(in srgb,var(--panel2) 45%, transparent)'),\n        picMark: picDone ? '✓' : '○',\n        picStyle: 'width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;font-weight:800;'\n          + (picDone ? 'background:var(--accent);color:var(--accent-ink);border:1px solid var(--accent);' : 'background:var(--panel2);color:var(--muted);border:1px solid var(--line);'),\n        onPic: () => this.togglePic(w),\n        fields: this.MEAS_FIELDS.map(f => ({ value: rec[f.key] || '', onInput: (ev) => this.setMeas(w, f.key, ev.target.value) }))\n      });\n    }\n\n    // reference\n    const phaseRows = this.PHASE_ROWS.map(r => ({ name: r[0], dates: r[1], focus: r[2], dot: 'width:11px;height:11px;border-radius:50%;flex:none;background:' + this.PHASE_COLORS[r[0]] }));\n    const stations = this.STATIONS.map(s => ({ n: s[0], name: s[1], sub: s[2] }));\n\n    return {\n      rootRef: this.rootRef, themes, tabs,\n      showMedium: tab === 'medium', showPlan: tab === 'plan', showMeas: tab === 'meas', showRef: tab === 'ref',\n      dayIndexLabel: String(di).padStart(2, '0'),\n      todayLabel: this.fmt(this.startOfDay(new Date())) + ', 2026',\n      progressStyle: 'height:100%;background:var(--accent);width:' + pct + '%;border-radius:999px;transition:width .35s ease',\n      completeCount, streak, remaining: 75 - completeCount,\n      rules: ['One 45-min workout', '200g protein · 2,600 cal', 'No alcohol · no sweets / fried', '10 pages of reading', '1 gallon of water', 'Weekly progress pic + measurements'],\n      weekChips, weekTitle,\n      focusDayNum: focusDay, focusDateStr: this.fmt(fdt) + ', 2026',\n      focusBadgeText: fComplete ? 'Complete' : fDone + '/7 done',\n      focusBadgeStyle: 'margin-left:auto;padding:5px 12px;border-radius:999px;font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;'\n        + (fComplete ? 'background:var(--done);color:#06251a;' : 'background:var(--panel2);color:var(--muted);border:1px solid var(--line);'),\n      focusDaily: this.TASKS_DAILY.map(mkTask), focusDiet: this.TASKS_DIET.map(mkTask),\n      grid,\n      phaseLegend, weeks, currentWeekVM: weeks.find(w => w.isCurrent) || weeks[0],\n      measCols: this.MEAS_FIELDS.map(f => f.label), measRows,\n      phaseRows, stations, notes: this.NOTES\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
