<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Hybrid Tracker</title>
<style>
  :root{ --bg:#0f1115; --card:#1a1d24; --line:#2a2e38; --ink:#e8eaed; --sub:#9aa0aa;
         --accent:#4f8cff; --good:#3ecf8e; --race:#ff5d5d; }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);
       -webkit-font-smoothing:antialiased}
  /* ---- login ---- */
  .loginWrap{max-width:420px;margin:0 auto;padding:64px 16px}
  h1{font-size:22px;margin:0 0 4px}
  .muted{color:var(--sub);font-size:13px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:16px}
  input[type=email],input[type=password]{background:#11141a;border:1px solid var(--line);color:var(--ink);
     border-radius:9px;padding:11px 12px;font-size:15px;width:100%}
  button{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 16px;font-size:15px;
     font-weight:600;cursor:pointer;width:100%}
  button:active{opacity:.85}
  .ok{color:var(--good)} .err{color:var(--race)} .center{text-align:center}
  .hidden{display:none}
  /* ---- app frame ---- */
  #appFrame{position:fixed;inset:0;width:100%;height:100%;border:0;background:#f4f1ea}
  #logout{position:fixed;top:10px;right:10px;width:auto;z-index:10;padding:7px 12px;font-size:13px;
     background:rgba(20,22,28,.7);border:1px solid var(--line);color:var(--ink);border-radius:8px;backdrop-filter:blur(4px)}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- ====== LOGIN ====== -->
  <div id="login" class="loginWrap hidden">
    <h1>Hybrid Tracker</h1>
    <p class="muted">Sign in with your email and password. Only the registered account works.</p>
    <div class="card">
      <input type="email" id="email" placeholder="you@email.com" autocomplete="email">
      <div style="height:12px"></div>
      <input type="password" id="password" placeholder="Password" autocomplete="current-password">
      <div style="height:12px"></div>
      <button id="signIn">Sign in</button>
      <p id="loginMsg" class="muted center" style="margin:12px 0 0"></p>
    </div>
  </div>

  <!-- ====== APP (your design, loaded after login) ====== -->
  <button id="logout" class="hidden">Log out</button>
  <iframe id="appFrame" class="hidden" title="Hybrid Tracker"></iframe>

<script>
/* ---------------------- CONFIG ---------------------- */
const SUPABASE_URL  = "https://yaohjueiififikjypvuv.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_uHmKxUaOvi-2CfVUhxtphA_IcXLDP_l";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);

/* ---------------------- AUTH GATE ---------------------- */
function showLogin(){
  $("login").classList.remove("hidden");
  $("logout").classList.add("hidden");
  $("appFrame").classList.add("hidden");
}
function showApp(){
  $("login").classList.add("hidden");
  $("logout").classList.remove("hidden");
  const f = $("appFrame");
  if(!f.getAttribute("src")) f.setAttribute("src", "app.html");   // load your bundled tracker once
  f.classList.remove("hidden");
}
async function refresh(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ showApp(); } else { showLogin(); }
}

$("signIn").onclick = async () => {
  const email = $("email").value.trim();
  const password = $("password").value;
  if(!email || !password){ $("loginMsg").innerHTML = '<span class="err">Enter your email and password.</span>'; return; }
  $("loginMsg").textContent = "Signing in...";
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error){
    $("loginMsg").innerHTML = `<span class="err">${error.message}</span>`;
  } else {
    $("loginMsg").innerHTML = '<span class="ok">Signed in.</span>';
    refresh();
  }
};
$("password").addEventListener("keydown", e => { if(e.key === "Enter") $("signIn").click(); });
$("logout").onclick = async () => { await sb.auth.signOut(); showLogin(); };

sb.auth.onAuthStateChange(() => refresh());
refresh();
</script>
</body>
</html>
